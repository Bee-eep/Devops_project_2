name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Run Unit Tests
      run: mvn test

    - name: Build with Maven
      run: mvn clean install

    - name: Run Integration Tests
      run: mvn verify

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-pipeline:${{ github.run_number }} .

    - name: Tag Docker Image
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/ci-pipeline:${{ github.run_number }} ${{ secrets.DOCKER_USERNAME }}/ci-pipeline:latest

    - name: Scan Image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ secrets.DOCKER_USERNAME }}/ci-pipeline:${{ github.run_number }}
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy Results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker Image to Hub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/ci-pipeline:${{ github.run_number }}
        docker push ${{ secrets.DOCKER_USERNAME }}/ci-pipeline:latest
